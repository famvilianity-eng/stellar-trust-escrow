name: Nightly Stress Test

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  stress-test:
    name: Nightly Stress Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate test data
        run: npm run loadtest:generate

      - name: Run stress tests
        run: npm run loadtest:stress
        env:
          STRESS_DURATION: '300' # 5 minutes per scenario
          STRESS_CONNECTIONS: '200'
          CI: 'true'
        continue-on-error: true # Don't fail the workflow, just report

      - name: Upload stress test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-reports-${{ github.run_number }}
          path: |
            load-tests/results/stress/*.json
            load-tests/results/stress/*.html
          retention-days: 90

      - name: Run nightly load tests with history
        run: npm run loadtest:nightly
        continue-on-error: true

      - name: Upload nightly reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports-${{ github.run_number }}
          path: |
            load-tests/results/history/history.json
            load-tests/results/history/dashboard.html
            load-tests/results/history/alerts.json
          retention-days: 90

      - name: Check for critical alerts
        if: always()
        run: |
          if [ -f load-tests/results/stress/latest.json ]; then
            CRITICAL_ALERTS=$(jq '[.alerts[] | select(.severity == "critical")] | length' load-tests/results/stress/latest.json)
            HIGH_ALERTS=$(jq '[.alerts[] | select(.severity == "high")] | length' load-tests/results/stress/latest.json)
            
            echo "Critical alerts: $CRITICAL_ALERTS"
            echo "High severity alerts: $HIGH_ALERTS"
            
            if [ "$CRITICAL_ALERTS" -gt "0" ] || [ "$HIGH_ALERTS" -gt "2" ]; then
              echo "::error::Stress test detected $CRITICAL_ALERTS critical and $HIGH_ALERTS high severity alerts"
              exit 1
            fi
          fi

      - name: Slack Notification on failure
        if: failure() && vars.SLACK_WEBHOOK != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: 'Nightly Stress Test Failed'
          SLACK_MESSAGE: |
            Nightly stress test detected performance regressions or critical alerts.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Download reports from artifacts to investigate.

      - name: Slack Notification on success
        if: success() && vars.SLACK_WEBHOOK != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_TITLE: 'Nightly Stress Test Passed'
          SLACK_MESSAGE: |
            Nightly stress test completed successfully with no critical alerts.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
